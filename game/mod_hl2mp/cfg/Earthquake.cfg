sv_cheats 1

//keyinds
alias -w "-forward;alias wn sn;check" 
alias +w "+forward;host_timescale 1;alias wn false" 
bind w "+w"; 
alias -s "-back;alias sn an;check" 
alias +s "+back;host_timescale 1;alias sn false" 
bind s "+s"; 
alias -a "-moveleft;alias an dn;check" 
alias +a "+moveleft;host_timescale 1;alias an false" 
bind a "+a"; 
alias -d "-moveright;alias dn m1n;check" 
alias +d "+moveright;host_timescale 1;alias dn false" 
bind d "+d"; 
alias -mouse1 "-attack;alias m1n m2n;check" 
alias +mouse1 "+attack;host_timescale 1;alias m1n false" 
alias +mouse2 "+attack2;host_timescale 1;alias m2n false" 
alias -mouse2 "-attack2;alias m2n sn;check" 
bind mouse1 "+mouse1 
bind mouse2 "+mouse2" 
alias -space "-jump;alias sn host_timescale 0.1;check" 
alias +space "+jump;host_timescale 1;alias sn false" 
bind space "+space"


//and gates
alias check "wn"

alias false ""

alias wn "sn"
alias sn "an"
alias an "dn"
alias dn "m1n"
alias m1n "m2n"
alias m2n "sn"
alias sn "host_timescale 0.1"